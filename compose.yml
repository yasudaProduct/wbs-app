services:
  app:
    build:
      context: .
    volumes:
      - .:/app
    tty: true
  db:
    image: postgres:12-alpine
    container_name: wbs-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres:/var/lib/postgresql/data
volumes:
  postgres: